<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crónicas de Nuestro Amor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Pinyon+Script&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/victorian.css">
    

</head>

<body>

    <div class="overlay-glow"></div>

    <main class="login-container">
        <section class="victorian-card">
            <div class="ornament-top">✦</div>

            <h1 class="main-title">Crónicas de Nuestro Amor</h1>
            <p class="dedication">Una puerta solo para ti, mi vida.</p>

            <form id="login-form" onsubmit="event.preventDefault(); checkAccess();">
                <div class="input-group">
                    <label for="pass-input" class="label-text">Introduce nuestro secreto</label>
                    <input type="password" id="pass-input" placeholder="Nuestra fecha o lema..." required>
                </div>

                <button type="submit" class="btn-victorian">
                    <span class="btn-text">ENTRAR</span>
                </button>
            </form>

            <div class="ornament-bottom">✦</div>
        </section>
    </main>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="ornament">❧</span>
            <h2 class="script-font">Lo lamento, mi vida...</h2>
            <p>El corazón no reconoce esa palabra secreta. Inténtalo de nuevo.</p>
            <button onclick="closeModal()" class="btn-victorian">Regresar</button>
            <span class="ornament">☙</span>
        </div>
    </div>

    <script src="./js/script.js"></script>
</body>

</html>
